<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#container{
  position:relative;
}

/* MÁQUINA */
#icon{
  width:260px;
  image-rendering:pixelated;
}

/* BEBIDA */
#drink{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%, 0) scale(0.5);
  width:180px;
  display:none;
  image-rendering:pixelated;
  opacity:0;
}

/* GLOW */
#glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(0,255,255,0.5), transparent);
  border-radius:50%;
  animation:pulse 1.5s infinite;
  display:none;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1); opacity:0.6;}
  50%{transform:translate(-50%,-50%) scale(1.2); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1); opacity:0.6;}
}

/* ANIMACIÓN SALIR */
@keyframes salir{
  0%{
    top:55%;
    opacity:0;
    transform:translate(-50%, 0) scale(0.5);
  }
  100%{
    top:20%;
    opacity:1;
    transform:translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="container">
  <div id="glow"></div>
  <img id="icon" src="jugger.png">
  <img id="drink">
</div>

<script>

// 🔊 AUDIOS
const audioSpin = new Audio("./moviendose.mp3");
const audioDrink = new Audio("./samantha.mp3");

// 🔓 DESBLOQUEO DE AUDIO (CLAVE)
let audioUnlocked = false;

function unlockAudio(){
  if(audioUnlocked) return;

  audioSpin.volume = 0;
  audioDrink.volume = 0;

  audioSpin.play().then(()=>audioSpin.pause()).catch(()=>{});
  audioDrink.play().then(()=>audioDrink.pause()).catch(()=>{});

  audioSpin.volume = 0.7;
  audioDrink.volume = 1;

  audioUnlocked = true;
}

// activar con interacción
document.addEventListener("click", unlockAudio);
document.addEventListener("keydown", unlockAudio);

// 🎰 PERKS
const perks = [
  {icon:"jugger.png", drink:"bt-jugger.png"},
  {icon:"speed.png", drink:"bt-speed.png"},
  {icon:"doble.png", drink:"bt-doble.png"},
  {icon:"quick.png", drink:"bt-quick.png"}
];

let activo = false;

function activarPerk(){

  if(activo) return;
  activo = true;

  let icon = document.getElementById("icon");
  let drink = document.getElementById("drink");
  let glow = document.getElementById("glow");

  drink.style.display = "none";
  glow.style.display = "none";

  // 🔊 SONIDO GIRANDO
  audioSpin.currentTime = 0;
  audioSpin.play().catch(()=>{});

  // 🎰 RULETA
  let i = 0;
  let speed = 80;
  let totalTime = 0;
  let duration = 3500;

  let interval = setInterval(()=>{

    let current = perks[i % perks.length];
    icon.src = current.icon;

    icon.style.opacity = Math.random() > 0.5 ? "1" : "0.5";

    i++;
    totalTime += speed;

    if(totalTime > duration * 0.6){
      speed += 20;
    }

    if(totalTime >= duration){
      clearInterval(interval);

      let final = perks[Math.floor(Math.random()*perks.length)];

      icon.src = final.icon;
      icon.style.opacity = "1";

      glow.style.display = "block";

      // 🥤 SALE LA BOTELLA
      setTimeout(()=>{

        drink.src = final.drink;
        drink.style.display = "block";
        drink.style.animation = "salir 0.6s ease forwards";

        // 🔊 SONIDO BEBER
        setTimeout(()=>{
          audioDrink.currentTime = 0;
          audioDrink.play().catch(()=>{});
        },500);

      },500);
    }

  }, speed);

  // reset
  setTimeout(()=>{
    drink.style.display = "none";
    glow.style.display = "none";
    drink.style.animation = "";
    activo = false;
  },6000);
}

//////////////////////////////////////////////////
// 🎯 TIKFINITY
//////////////////////////////////////////////////

window.addEventListener("message", (event) => {
  if(event.data === "perk"){
    activarPerk();
  }
});

// 🧪 PRUEBA (puedes quitar esto luego)
activarPerk();

</script>

</body>
</html>
